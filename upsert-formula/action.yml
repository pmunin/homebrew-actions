name: Upsert Formula
description: Render a formula template and create or update it in a Homebrew tap repository

inputs:
  formula-name:
    description: 'Formula name (defaults to calling repo name). Updated file: Formula/<name>.rb'
    required: false
    default: ${{ github.event.repository.name }}
  formula-template-path:
    description: 'Path to .rb.envsubst template file in the calling repo workspace'
    required: true
  extra-envs:
    description: 'Additional env vars for envsubst (on top of action-provided ones), multiline KEY=VALUE'
    required: false
    default: ''
  homebrew-repo:
    description: 'Target Homebrew tap repository (e.g. "owner/homebrew-personal")'
    required: true
  github-write-token:
    description: 'GitHub PAT with write access to the homebrew-repo (GITHUB_TOKEN cannot write cross-repo)'
    required: true

runs:
  using: composite
  steps:
    - name: Render and upsert formula
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-write-token }}
        FORMULA_NAME: ${{ inputs.formula-name }}
        FORMULA_TEMPLATE_PATH: ${{ inputs.formula-template-path }}
        HOMEBREW_REPO: ${{ inputs.homebrew-repo }}
        EXTRA_ENVS: ${{ inputs.extra-envs }}
      run: |
        # Export extra env vars and build substitution list for envsubst
        SUBST_VARS=""
        if [ -n "$EXTRA_ENVS" ]; then
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              export "$key=$value"
              SUBST_VARS="${SUBST_VARS}\${${key}} "
            fi
          done <<< "$EXTRA_ENVS"
        fi

        # Render template (only substitute explicitly provided vars)
        CONTENT=$(envsubst "$SUBST_VARS" < "$FORMULA_TEMPLATE_PATH")

        # Derive tag for commit message
        TAG="${GITHUB_REF_NAME:-unknown}"
        if [ -n "${{ github.event.release.tag_name }}" ]; then
          TAG="${{ github.event.release.tag_name }}"
        fi

        # Upsert formula in target homebrew repo via GitHub API
        FORMULA_PATH="Formula/${FORMULA_NAME}.rb"
        ENCODED=$(printf '%s' "$CONTENT" | base64)

        # Try to get existing file SHA (will be empty for new formulas)
        SHA=$(gh api "repos/$HOMEBREW_REPO/contents/$FORMULA_PATH" --jq '.sha' 2>/dev/null || true)

        API_ARGS=(
          -X PUT
          -f message="Bump $FORMULA_NAME to $TAG"
          -f content="$ENCODED"
          -f branch="main"
        )
        if [ -n "$SHA" ]; then
          API_ARGS+=(-f sha="$SHA")
        fi

        gh api "repos/$HOMEBREW_REPO/contents/$FORMULA_PATH" "${API_ARGS[@]}"
