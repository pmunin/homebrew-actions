name: Upsert Formula
description: Render a formula template and create or update it in a Homebrew tap repository

inputs:
  formula-name:
    description: 'Formula name (defaults to calling repo name, stripping "homebrew-" prefix if present). Updated file: Formula/<name>.rb'
    required: false
    default: ''
  formula-template-path:
    description: 'Path to .rb.envsubst template file in the calling repo workspace'
    required: true
  extra-envs:
    description: 'Additional env vars for envsubst (on top of action-provided ones), multiline KEY=VALUE'
    required: false
    default: ''
  homebrew-repo:
    description: 'Target Homebrew tap repository (e.g. "owner/homebrew-personal"). Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  formula-commit-message:
    description: 'Custom commit message for the formula upsert. Defaults to "Upsert <formula-name> formula"'
    required: false
    default: ''
  formula-commit-tag:
    description: 'If set, upsert this tag to the formula commit in the target repo'
    required: false
    default: ''
  github-write-token:
    description: 'GitHub PAT with write access to the homebrew-repo (GITHUB_TOKEN cannot write cross-repo)'
    required: true

runs:
  using: composite
  steps:
    - name: Render and upsert formula
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-write-token }}
        FORMULA_NAME: ${{ inputs.formula-name }}
        FORMULA_TEMPLATE_PATH: ${{ inputs.formula-template-path }}
        HOMEBREW_REPO: ${{ inputs.homebrew-repo }}
        EXTRA_ENVS: ${{ inputs.extra-envs }}
        FORMULA_COMMIT_MESSAGE: ${{ inputs.formula-commit-message }}
        FORMULA_COMMIT_TAG: ${{ inputs.formula-commit-tag }}
      run: |
        # Default formula name: repo name with "homebrew-" prefix stripped
        if [ -z "$FORMULA_NAME" ]; then
          FORMULA_NAME="${{ github.event.repository.name }}"
          FORMULA_NAME="${FORMULA_NAME#homebrew-}"
        fi

        # Export extra env vars and build substitution list for envsubst
        SUBST_VARS=""
        if [ -n "$EXTRA_ENVS" ]; then
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              export "$key=$value"
              SUBST_VARS="${SUBST_VARS}\${${key}} "
            fi
          done <<< "$EXTRA_ENVS"
        fi

        # Render template (only substitute explicitly provided vars)
        CONTENT=$(envsubst "$SUBST_VARS" < "$FORMULA_TEMPLATE_PATH")

        # Derive tag for commit message
        TAG="${GITHUB_REF_NAME:-unknown}"
        if [ -n "${{ github.event.release.tag_name }}" ]; then
          TAG="${{ github.event.release.tag_name }}"
        fi

        # Upsert formula in target homebrew repo via GitHub API
        FORMULA_PATH="Formula/${FORMULA_NAME}.rb"
        ENCODED=$(printf '%s' "$CONTENT" | base64)

        # Try to get existing file SHA (will be empty for new formulas)
        SHA=$(gh api "repos/$HOMEBREW_REPO/contents/$FORMULA_PATH" --jq '.sha' 2>/dev/null || true)

        API_ARGS=(
          -X PUT
          -f message="${FORMULA_COMMIT_MESSAGE:-Upsert $FORMULA_NAME formula}"
          -f content="$ENCODED"
          -f branch="main"
        )
        if [ -n "$SHA" ]; then
          API_ARGS+=(-f sha="$SHA")
        fi

        COMMIT_SHA=$(gh api "repos/$HOMEBREW_REPO/contents/$FORMULA_PATH" "${API_ARGS[@]}" --jq '.commit.sha')

        # Optionally tag the formula commit
        if [ -n "$FORMULA_COMMIT_TAG" ] && [ -n "$COMMIT_SHA" ]; then
          REF="refs/tags/$FORMULA_COMMIT_TAG"
          # Try to update existing tag, otherwise create it
          if gh api "repos/$HOMEBREW_REPO/git/$REF" --silent 2>/dev/null; then
            gh api -X PATCH "repos/$HOMEBREW_REPO/git/$REF" -f sha="$COMMIT_SHA" -F force=true
          else
            gh api -X POST "repos/$HOMEBREW_REPO/git/refs" -f ref="$REF" -f sha="$COMMIT_SHA"
          fi
          echo "Tagged $FORMULA_COMMIT_TAG -> $COMMIT_SHA in $HOMEBREW_REPO"
        fi
